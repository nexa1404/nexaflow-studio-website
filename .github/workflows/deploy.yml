name: Deploy a Vercel (producción)

# Despliega automáticamente a producción cada vez que se hace push a main.
# Requisito único (una sola vez): añadir el secreto VERCEL_TOKEN en
# GitHub → Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_BOywyy8bSh7cAH6AuPsWoQVV
      VERCEL_PROJECT_ID: prj_q4rYQF38yUeo8ZPfCZ1IfFhVVtA6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Descargar configuración del proyecto (producción)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Construir
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Desplegar a producción
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
