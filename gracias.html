<style id="nf-crit">html,body{background:#f5f5f1}</style>
<link rel="stylesheet" href="css/nf.css?v=3" />
<style>
.ty-wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 22px 90px;background:var(--paper);position:relative;overflow:hidden}
.ty-wrap::before{content:'';position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:70%;height:60%;background:radial-gradient(ellipse at 50% 30%,rgba(200,255,71,.22),transparent 60%);pointer-events:none}
.ty-card{position:relative;z-index:2;max-width:520px}
.ty-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:34px}
.ty-logo img{width:40px;height:40px}
.ty-logo b{font-family:'Syne';font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--ink)}
.ty-logo b span{color:#8bbf1e}
.ty-check{width:70px;height:70px;border-radius:50%;background:var(--lime);display:grid;place-items:center;margin:0 auto 26px;box-shadow:0 14px 40px rgba(200,255,71,.4)}
.ty-check svg{width:34px;height:34px;color:#0e0f10}
.ty-card h1{font-family:'Syne';font-weight:800;font-size:clamp(30px,6vw,44px);line-height:1.1;letter-spacing:-1px;color:var(--ink);margin:0 0 14px}
.ty-card p{font-size:16.5px;line-height:1.65;color:var(--muted);margin:0 auto 30px;max-width:440px}
.ty-ctas{display:inline-flex;gap:12px;flex-wrap:wrap;justify-content:center}
.ty-eyebrow{font-family:'DM Sans';font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5f8f14;font-weight:600;margin-bottom:16px;display:block}
</style>
</head>
<body>
<main class="ty-wrap">
  <div class="ty-card">
    <a href="index.html" class="ty-logo" aria-label="NexaFlow Studio — inicio">
      <img src="assets/logo-mark.png" alt="NexaFlow Studio" />
      <b>Nexa<span>Flow</span></b>
    </a>
    <div class="ty-check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>

    <div class="ty-ctas">
      <a class="btn btn-ink" href="blog.html"><span>Leer el blog</span> <span class="ar">→</span></a>
      <a class="btn btn-ghost" href="index.html#contacto"><span>Solicitar auditoría gratuita</span></a>
    </div>
  </div>
</main>
</body>
